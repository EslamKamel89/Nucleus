<header
  class="sticky top-0 z-50 border-b border-base-300 bg-base-100/80 backdrop-blur"
>

    <div class="navbar-start">
      <a href="/" class="flex items-center gap-3">
        <div class="avatar placeholder">
          <div class="bg-primary text-primary-content w-10 rounded-xl">

        <div>

    <div class="navbar-center hidden lg:flex">
